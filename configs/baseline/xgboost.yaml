# XGBoost baseline configuration
_target_: gnn.baselines.xgboost_baseline.XGBoostBaseline

property_names:
  - logS
  - logP
  - pKa

n_estimators: 500
max_depth: 6
learning_rate: 0.05
subsample: 0.8
colsample_bytree: 0.8
reg_lambda: 1.0
n_jobs: -1
eval_metric: mae
early_stopping_rounds: 25
tree_method: hist
verbosity: 0
random_state: ${seed}
