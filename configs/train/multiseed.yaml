# Optional training preset for documented multi-seed runs. The canonical CLI remains:
#   python scripts/train.py --multirun seed=42,43,44 model=painn data=pfasbench
#
# This preset simply enables the multiseed metadata/reporting knobs explicitly when
# callers prefer `train=multiseed`.

task_name: train

tags: ["dev", "multiseed"]

run_train: true
run_test: true

ckpt_path: null
seed: null
optimized_metric: null

multiseed:
  enabled: true
  sweep_dir: null
  job_num: null
  ci_method: normal
  ci_level: 0.95
  bootstrap_resamples: 2000
  bootstrap_random_seed: 0
  metrics_filename: multiseed_metrics.json
  summary_json: multiseed_summary.json
  summary_csv: multiseed_summary.csv
  summary_md: multiseed_summary.md
  wandb_summary_prefix: multiseed
