# @package _global_

# Canonical Hydra entrypoint for training and experiment execution.
# Example:
#   python scripts/train.py model=painn data=pfasbench
# Override example:
#   python scripts/train.py model=painn data=pfasbench trainer.max_epochs=5
defaults:
  - _self_
  - data: pfasbench
  - model: momlca
  - train: default
  - callbacks: default
  - logger: null # set logger here or use command line (e.g. `python scripts/train.py logger=tensorboard`)
  - trainer: default
  - paths: default
  - extras: default
  - hydra: default

  # experiment configs allow for version control of specific hyperparameters
  # e.g. best hyperparameters for given model and datamodule
  - experiment: null

  # config for hyperparameter optimization
  - hparams_search: null

  # optional local config for machine/user specific settings
  # it's optional since it doesn't need to exist and is excluded from version control
  - optional local: default

  # debugging config (enable through command line, e.g. `python scripts/train.py debug=default)
  - debug: null

# The canonical training entrypoint should boot into the project stack without
# requiring callers to remember the PFASBench/GNN overrides up front.
task_name: ${train.task_name}
tags: ${train.tags}
test: ${train.run_test}
ckpt_path: ${train.ckpt_path}
seed: ${train.seed}
optimized_metric: ${train.optimized_metric}
