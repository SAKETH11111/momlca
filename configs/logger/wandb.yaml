# Weights & Biases via Lightning WandbLogger.
# Example: python scripts/train.py model=painn data=pfasbench logger=wandb
#
# Checkpoints stay under ${paths.output_dir}/checkpoints. To optionally upload
# those checkpoints as W&B artifacts, set log_model: true (end of run) or log_model: "all"
# (during training) — Lightning handles upload; paths are not relocated.
#
# Optional code snapshot (wandb Run.log_code): enable wandb_log_code below. Safe for offline
# runs; no effect when logger is not W&B.

wandb_log_code: false

wandb:
  _target_: lightning.pytorch.loggers.wandb.WandbLogger
  # name: "" # run name; leave unset for W&B to generate
  save_dir: "${paths.output_dir}"
  offline: false
  id: null # pass correct id to resume experiment!
  anonymous: null # enable anonymous logging
  project: "moml"
  log_model: false # false | true | "all" — see Lightning WandbLogger docs
  prefix: "" # a string to put at the beginning of metric keys
  # entity: "" # set to name of your wandb team
  group: ""
  tags: ${tags}
  job_type: ""
