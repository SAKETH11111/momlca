name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          version: 2.2.1
          virtualenvs-create: true
          virtualenvs-in-project: true
      - name: Install dependencies
        run: poetry install --only dev --no-root
      - name: Lint with ruff
        run: |
          poetry run ruff check .
          poetry run ruff format --check .

  type-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          version: 2.2.1
          virtualenvs-create: true
          virtualenvs-in-project: true
      - name: Install dependencies
        run: poetry install
      - name: Type check with mypy
        run: poetry run mypy

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          version: 2.2.1
          virtualenvs-create: true
          virtualenvs-in-project: true
      - name: Install dependencies
        run: poetry install
      - name: Install CPU PyTorch wheels
        run: |
          case "${{ matrix.python-version }}" in
            "3.10"|"3.11")
              poetry run pip install --force-reinstall --no-deps \
                torch==2.1.0 torchvision==0.16.0 \
                --index-url https://download.pytorch.org/whl/cpu
              ;;
            "3.12")
              poetry run pip install --force-reinstall --no-deps \
                torch==2.11.0 torchvision==0.26.0 \
                --index-url https://download.pytorch.org/whl/cpu
              ;;
          esac
          poetry run pip install --force-reinstall --no-deps "numpy<2"
      - name: Materialize DVC-tracked artifacts
        run: poetry run dvc pull
      - name: Run tests
        run: poetry run pytest -v --cov=src -k "not ddp"
